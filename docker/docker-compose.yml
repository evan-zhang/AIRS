services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python3", "api/server.py", "--host", "0.0.0.0", "--port", "8765"]
    ports:
      - "8765:8765"
    volumes:
      - airs-workspace:/app/workspace-data
      - airs-cache:/app/.cache/airs
    environment:
      AIRS_CONNECTOR_MODE: mock
      AIRS_DEMO_MODE: "true"
      AIRS_API_KEY: ${AIRS_API_KEY:?Set AIRS_API_KEY before exposing the API}
      AIRS_CORS_ALLOW_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      AIRS_RATE_LIMIT_PER_MINUTE: 120
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8765/health', headers={'X-AIRS-API-Key': os.environ['AIRS_API_KEY']}); urllib.request.urlopen(req, timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python3", "-m", "http.server", "8080", "--directory", "web"]
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - airs-workspace:/app/workspace-data
      - airs-cache:/app/.cache/airs

volumes:
  airs-workspace:
  airs-cache:
